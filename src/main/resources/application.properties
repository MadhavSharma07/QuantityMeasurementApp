spring.application.name=quantity-measurement-app

spring.datasource.url=jdbc:mysql://localhost:3306/qma
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Madhav@7206

# ===== JPA =====
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===== Swagger =====
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.url=/api-docs
springdoc.swagger-ui.config-url=/api-docs/swagger-config
springdoc.swagger-ui.persist-authorization=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# ===== JWT =====
jwt.secret=quantity-measurement-super-secret-key-2024
jwt.expiration=86400000

# ===== OAuth2 Google =====
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info

# ===== Logging =====
logging.level.com.app.quantitymeasurementapp=INFO
logging.level.org.springframework.security=WARN